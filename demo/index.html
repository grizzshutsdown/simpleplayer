<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SimplePlayer Demo</title>
    <script type="module" src="/src/simple-player.ts"></script>
    <style>
      :root {
        background: #111;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: 100%;
        max-width: 980px;
      }

      simple-player {
        width: 100%;
        max-height: calc(100vh - 48px);
        --simple-player-object-fit: cover;
      }
    </style>
  </head>
  <body>
    <main>
      <simple-player
        src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"
        aspect-ratio="16 / 9">
      </simple-player>
    </main>
  </body>
</html>
